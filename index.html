<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📋 قسم الجرد + الترقيات</title>

  <style>
    :root{
      --menuW: 250px;
      --gold: #e0ca51;
      --gold-dark: #cdb63f;
      --bg: #111;
      --panel: rgba(0,0,0,0.60);
      --field: rgba(40,40,40,0.88);
      --line: rgba(224,202,81,0.95);
      --text: #e0ca51;
      --muted: #c9b94e;
      --radius: 14px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      margin:0;
      font-family: Tahoma, Arial, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(0,0,0,.76), rgba(0,0,0,.76)),
        url("https://raw.githubusercontent.com/xhhp1/mechanics/main/images/mechan.png") center/cover fixed no-repeat;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.02), transparent 45%);
      pointer-events:none;
    }

    /* side menu */
    .menu{
      position:fixed;
      top:0;
      right:0;
      width:var(--menuW);
      height:100vh;
      padding:24px 18px;
      border-left:2px solid rgba(224,202,81,.8);
      background:rgba(0,0,0,.50);
      backdrop-filter: blur(2px);
      z-index:20;
    }

    .menu-title{
      text-align:center;
      font-size:22px;
      font-weight:700;
      margin:0 0 18px;
    }

    .menu input,
    .menu select,
    .menu button{
      width:100%;
      margin:0 0 10px;
    }

    /* main content */
    .container{
      margin-right:calc(var(--menuW) + 26px);
      padding:24px 26px 34px;
      min-height:100vh;
    }

    .page-title{
      text-align:center;
      font-size:30px;
      font-weight:700;
      margin:8px 0 26px;
      letter-spacing:.3px;
      text-shadow:0 0 8px rgba(224,202,81,.15);
    }

    .section-title{
      text-align:center;
      font-size:22px;
      font-weight:700;
      margin:0 0 10px;
      color:var(--gold);
    }

    .panel{
      background:transparent;
      border:none;
      border-radius:18px;
      margin-bottom:18px;
    }

    .row{
      display:flex;
      gap:36px;
      align-items:flex-start;
    }

    .col{
      flex:1;
      min-width:0;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:15px;
      color:var(--muted);
    }

    textarea,
    input,
    select{
      width:100%;
      border:1.5px solid var(--line);
      border-radius:12px;
      background:var(--field);
      color:var(--text);
      outline:none;
      font-family:Tahoma, Arial, sans-serif;
      transition:.18s ease;
    }

    input,
    select{
      height:42px;
      padding:0 14px;
    }

    textarea{
      resize:none;
      min-height:190px;
      padding:14px;
      line-height:1.8;
    }

    textarea::placeholder,
    input::placeholder{
      color:#8f8f8f;
    }

    textarea:focus,
    input:focus,
    select:focus{
      box-shadow:0 0 0 3px rgba(224,202,81,.10);
      border-color:#f0d95f;
    }

    .actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .mid-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:10px;
      margin-bottom:34px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:10px 18px;
      background:var(--gold);
      color:#111;
      font-family:Tahoma, Arial, sans-serif;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      background:#e8d25b;
      box-shadow:0 8px 16px rgba(0,0,0,.22);
    }

    .menu button{
      min-height:42px;
      border-radius:0;
      background:#d7c44b;
      color:#111;
      border:none;
      box-shadow:0 10px 0 rgba(110,94,20,.45);
      font-weight:700;
    }

    .menu button:hover{
      transform:translateY(-1px);
      background:#e1cf57;
    }

    .menu select,
    .menu input{
      background:rgba(20,20,20,.85);
      color:var(--gold);
      border:1.5px solid var(--line);
      border-radius:12px;
    }

    .counter{
      margin-top:8px;
      text-align:center;
      color:#d7c760;
      font-size:15px;
    }

    @media (max-width: 980px){
      .menu{
        position:relative;
        width:100%;
        height:auto;
        border-left:none;
        border-bottom:2px solid rgba(224,202,81,.8);
      }

      .container{
        margin-right:0;
        padding:18px;
      }

      .row{
        flex-direction:column;
        gap:18px;
      }
    }
  </style>
</head>
<body>

  <aside class="menu">
    <h2 class="menu-title">أدوات ⚙️</h2>

    <input id="startCode" type="number" placeholder="بداية الكود">

    <button onclick="filterQualified()">🏆 المستحقين</button>
    <button onclick="filterNotQualifiedOnly()">❌ غير المستحقين</button>
    <button onclick="filterNotQualified()">⚡ توزيع ذكي</button>

    <select id="levelSelect">
      <option value="trainee">متدرب ← مستوى 1</option>
      <option value="1">مستوى 1 ← مستوى 2</option>
      <option value="2">مستوى 2 ← مستوى 3</option>
      <option value="3">مستوى 3 ← مستوى 4</option>
      <option value="4">مستوى 4 ← مستوى 5</option>
      <option value="5">مستوى 5</option>
    </select>

    <button onclick="reassignByLevel()">🎯 حسب المستوى</button>
    <button onclick="reassignCodes()">🔄 إعادة توزيع</button>

    <select id="promotionType">
      <option value="trainee-1">متدرب → 1</option>
      <option value="1-2">1 → 2</option>
      <option value="2-3">2 → 3</option>
      <option value="3-4">3 → 4</option>
      <option value="4-5">4 → 5</option>
    </select>
  </aside>

  <main class="container">
    <h1 class="page-title">📋 قسم الجرد + الترقيات 📋</h1>

    <section class="panel">
      <h2 class="section-title">📥 الإدخال</h2>
      <textarea id="inputText" placeholder="حط النص هنا..."></textarea>

      <div class="mid-actions">
        <button onclick="resetFields()">مسح 🗑️</button>
        <button onclick="analyzeText()">تحليل</button>
      </div>
    </section>

    <section class="row">
      <div class="col panel">
        <h2 class="section-title">📋 النتيجة</h2>
        <textarea id="cleanedText" readonly></textarea>
        <div class="actions">
          <button onclick="copyText()">نسخ</button>
        </div>
      </div>

      <div class="col panel">
        <h2 class="section-title">📜 نموذج الترقيات</h2>
        <textarea id="promotionBox" readonly></textarea>
        <div class="actions">
          <button onclick="copyPromotion()">نسخ</button>
          <button onclick="generatePromotionForm()">توليد</button>
        </div>
      </div>
    </section>

    <p class="counter" id="counter"></p>
  </main>

  <script>
    function getPromotionLevels(){
      const type = document.getElementById("promotionType").value;
      switch(type){
        case "trainee-1": return ["متدرب", "1"];
        case "1-2": return ["1", "2"];
        case "2-3": return ["2", "3"];
        case "3-4": return ["3", "4"];
        case "4-5": return ["4", "5"];
        default: return ["متدرب", "1"];
      }
    }

    function parseLines(){
      const text = document.getElementById("inputText").value;
      const seen = new Set();

      return text.split("\n").map(line => {
        if(!line.trim() || line.includes("منصب شاغر")) return null;

        const id = line.match(/<@[^>]+>/)?.[0];
        if(!id || seen.has(id)) return null;

        seen.add(id);

        const checks = (line.match(/✅/g) || []).length;

        return {
          id,
          checks,
          qualified: checks >= 2
        };
      }).filter(Boolean);
    }

    function generatePromotionForm(){
      const data = parseLines().filter(d => d.qualified);
      const levels = getPromotionLevels();

      if(data.length === 0){
        document.getElementById("promotionBox").value = "⚠️ لا يوجد مستحقين";
        document.getElementById("counter").textContent = "";
        return;
      }

      const names = data.map(d => d.id).join("\n");

      document.getElementById("promotionBox").value =
`*** ▬▬▬ ﷽ ▬▬▬
\`\`\`diff
-الموضوع: ترقيات مستوى (${levels[0]})
\`\`\`

\`\`\`
أولا: ترقية الأسماء التالية من مستوى (${levels[0]}) إلى (${levels[1]})
ثانياً: اعتماد الأكواد الجديدة
ثالثاً: إلحاقهم بالدورات المستحقة
\`\`\`

${names}

* مع تمنياتنا لهم بالتوفيق والنجاح.`;

      document.getElementById("counter").textContent = `📋 عدد المستحقين: ${data.length}`;
    }

    function analyzeText(){
      let num = 1;
      document.getElementById("cleanedText").value =
        parseLines().map(d => `${d.id} G-${num++}`).join("\n");
    }

    function filterQualified(){
      document.getElementById("cleanedText").value =
        parseLines().filter(d => d.qualified).map(d => d.id).join("\n");
    }

    function filterNotQualifiedOnly(){
      document.getElementById("cleanedText").value =
        parseLines().filter(d => !d.qualified).map(d => d.id).join("\n");
    }

    function filterNotQualified(){
      let start = parseInt(document.getElementById("startCode").value) || 500;
      document.getElementById("cleanedText").value =
        parseLines().filter(d => !d.qualified).map(d => `${d.id} G-${start++}`).join("\n");
    }

    function reassignCodes(){
      document.getElementById("cleanedText").value =
        parseLines().filter(d => d.qualified).map((d, i) => `${d.id} G-${400 + i}`).join("\n");
    }

    function reassignByLevel(){
      const ranges = {
        "5":[100,144],
        "4":[145,184],
        "3":[185,269],
        "2":[270,399],
        "1":[400,699],
        "trainee":[700,999]
      };

      const level = document.getElementById("levelSelect").value;
      let [start, end] = ranges[level];
      const data = parseLines().filter(d => d.qualified);
      const result = [];

      for(const d of data){
        if(start > end) break;
        result.push(`${d.id} G-${start++}`);
      }

      document.getElementById("cleanedText").value = result.join("\n");
    }

    function copyText(){
      navigator.clipboard.writeText(document.getElementById("cleanedText").value);
    }

    function copyPromotion(){
      navigator.clipboard.writeText(document.getElementById("promotionBox").value);
    }

    function resetFields(){
      document.getElementById("inputText").value = "";
      document.getElementById("cleanedText").value = "";
      document.getElementById("promotionBox").value = "";
      document.getElementById("counter").textContent = "";
    }
  </script>
</body>
</html>
